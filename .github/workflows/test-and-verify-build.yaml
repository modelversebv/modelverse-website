name: Verify build on Pull Request

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
          check-latest: true
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set Build ENV variable
        run: echo "NEXT_PUBLIC_BUILD_SHA=$(git rev-parse --short=7 HEAD)" >> $GITHUB_ENV

      - name: Build
        run: npm run build
